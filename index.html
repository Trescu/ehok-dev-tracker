<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eHÖK Dev Tracker</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-icon" src="assets/favicon.png" alt="eHÖK ikon" />
      <div class="brand-copy">
        <img class="brand-logo" src="assets/ehok-logo-transparent.png" alt="eHÖK" />
        <span>Dev Tracker</span>
      </div>
    </div>

    <nav class="nav" aria-label="Fő navigáció">
      <button class="nav-item active" data-view="dashboard">Dashboard</button>
      <button class="nav-item" data-view="sprints">Sprintek</button>
      <button class="nav-item" data-view="tasks">Feladatok</button>
      <button class="nav-item" data-view="milestones">Mérföldkövek</button>
      <button class="nav-item" data-view="notes">Jegyzetek</button>
    </nav>

    <div class="sidebar-footer">
      <button id="exportBtn" class="ghost-btn">CSV export</button>
      <label class="ghost-btn file-label">CSV import<input id="importInput" type="file" accept=".csv,text/csv" hidden /></label>
      <button id="resetBtn" class="ghost-btn ghost-danger">Üres állapot visszaállítása</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="eyebrow">eHÖK Dev Tracker</p>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <div class="top-actions">
        <button class="primary-btn" data-open-modal="task">Új feladat</button>
        <button class="secondary-btn" data-open-modal="sprint">Új sprint</button>
        <button class="secondary-btn" data-open-modal="milestone">Új mérföldkő</button>
      </div>
    </header>

    <section id="dashboard" class="view active-view">
      <div class="stats-grid">
        <article class="stat-card"><span>Összes sprint</span><strong id="statSprints">0</strong></article>
        <article class="stat-card"><span>Összes feladat</span><strong id="statTasks">0</strong></article>
        <article class="stat-card"><span>Kész feladat</span><strong id="statDone">0</strong></article>
        <article class="stat-card"><span>Blokkolt</span><strong id="statBlocked">0</strong></article>
      </div>

      <div class="content-grid">
        <article class="panel">
          <div class="panel-head"><h2>Feladatok területenként</h2><span id="overallPill" class="pill">0%</span></div>
          <div class="progress"><div id="overallBar"></div></div>
          <div id="areaProgress" class="area-list"></div>
        </article>

        <article class="panel">
          <div class="panel-head"><h2>Aktív sprintek</h2><button class="link-btn" data-jump="sprints">Megnyitás</button></div>
          <div id="activeSprints" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-head"><h2>Közelgő feladatok</h2><button class="link-btn" data-jump="tasks">Megnyitás</button></div>
          <div id="upcomingTasks" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-head"><h2>Mérföldkövek</h2><button class="link-btn" data-jump="milestones">Megnyitás</button></div>
          <div id="dashboardMilestones" class="stack"></div>
        </article>
      </div>
    </section>

    <section id="sprints" class="view">
      <div class="view-tools">
        <input id="sprintSearch" placeholder="Keresés sprintek között..." />
        <button class="primary-btn" data-open-modal="sprint">Új sprint</button>
      </div>
      <div id="sprintList" class="sprint-list"></div>
    </section>

    <section id="tasks" class="view">
      <div class="view-tools tools-grid">
        <input id="taskSearch" placeholder="Keresés feladatok között..." />
        <select id="taskAreaFilter"><option value="">Minden terület</option></select>
        <select id="taskStatusFilter"><option value="">Minden állapot</option></select>
        <button class="primary-btn" data-open-modal="task">Új feladat</button>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>

    <section id="milestones" class="view">
      <div class="view-tools">
        <input id="milestoneSearch" placeholder="Keresés mérföldkövek között..." />
        <button class="primary-btn" data-open-modal="milestone">Új mérföldkő</button>
      </div>
      <div id="milestoneList" class="card-list"></div>
    </section>

    <section id="notes" class="view">
      <div class="view-tools">
        <input id="noteSearch" placeholder="Keresés jegyzetek között..." />
        <button class="primary-btn" data-open-modal="note">Új jegyzet</button>
      </div>
      <div id="noteList" class="card-list"></div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="modalClose" class="modal-close" aria-label="Bezárás">×</button>
      <h2 id="modalTitle">Szerkesztés</h2>
      <form id="modalForm" class="modal-form"></form>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
